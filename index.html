<title>AnewSpan Support</title>
<style>
  :root { color-scheme: light; }
  body { margin: 0; background: #f6f6f4; color: #1c1c1e; font: 15px/1.7 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
  .wrap { max-width: 640px; margin: 0 auto; padding: 56px 20px; }
  h1 { font-size: 30px; margin: 0 0 6px; }

  .card { background: #fff; border-radius: 14px; padding: 20px 22px; margin-bottom: 16px; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
  .card h2 { font-size: 16px; margin: 0 0 8px; }
  .card p { margin: 6px 0; }
  .card a { color: #0a66c2; text-decoration: none; font-weight: 600; }

</style>

<body>
<main class="wrap">
  <h1>AnewSpan</h1>
  <p class="tagline">Understand weight, sleep, workouts, and health events privately — on your device.</p>
  <section class="card">
    <h2>Support</h2>
    <p>Need help with AnewSpan, Apple Health access, or widgets?</p>
    <p>Email <a href="mailto:intsusu@hotmail.com">intsusu@hotmail.com</a>.</p>
    <p>Please do not email screenshots or exports containing private health data.</p>
  </section>
  <section class="card privacy-links">
    <h2>Privacy Policy</h2>
    <a href="privacy/en.html">English</a>
    <a href="privacy/zh-Hans.html">简体中文</a>
